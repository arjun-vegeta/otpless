openapi: 3.0.3
info:
  title: OTPless Telecom Intelligence APIs
  description: >
    APIs for querying telecom-level signals about a phone number — including SIM
    swap history and call forwarding status.


    Use these APIs to add a pre-authentication risk check layer before or
    alongside your primary auth flow.


    **Authentication:** All requests require `clientId` and `clientSecret` as
    request headers. Use the same credentials you use for other OTPless APIs.


    **Error model:**

    - **HTTP 4xx:** Request rejected (invalid params, auth failure). Response
    body is an error object only (`errorCode`, `message`, `description`).

    - **HTTP 200 with `success: false`:** Request accepted but the check could
    not be completed. Inspect the error object for details.
  version: 1.0.0
servers:
  - url: https://platform.otpless.app
    description: Production server
paths:
  /v1/telecom/sim-swap-check:
    post:
      tags:
        - SIM_SWAP
      summary: SIM Swap Check
      description: >
        Checks whether the given phone number's SIM has been swapped within the
        specified time window.


        Returns `swapped: true` if a SIM swap was detected within `maxAge`
        hours. Returns `swapped: false` if no swap was detected. Also returns
        enriched phone details (operator, country, type) regardless of swap
        status.


        Use this as a pre-authentication risk signal — a recent SIM swap can
        indicate a SIM-swap attack.
      operationId: simSwapCheck
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SimSwapCheckRequest'
            examples:
              with_maxAge:
                summary: Check with maxAge window
                value:
                  phoneNumber: '917020141726'
                  maxAge: 72
              without_maxAge:
                summary: Check with default lookback window
                value:
                  phoneNumber: '917020141726'
      responses:
        '200':
          description: >
            **HTTP 200** — Request accepted. Inspect `success` in the body:

            - **`success: true`** — Check completed. Use `swapped` to determine
            result.

            - **`success: false`** — Check could not be completed. Inspect
            `error` for details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimSwapCheckResponse'
              examples:
                not_swapped:
                  summary: SIM not swapped
                  value:
                    success: true
                    swapped: false
                    phoneDetail:
                      operator: JIO
                      countryCode: '91'
                      country: IN
                      type: MOBILE
                      homeOperator: JIO
                      location: India
                      timeZones:
                        - Asia/Kolkata
                swapped:
                  summary: SIM was recently swapped
                  value:
                    success: true
                    swapped: true
                    phoneDetail:
                      operator: AIRTEL
                      countryCode: '91'
                      country: IN
                      type: MOBILE
                      homeOperator: AIRTEL
                      location: India
                      timeZones:
                        - Asia/Kolkata
                telecom_lookup_failed:
                  summary: Telecom lookup failed (P7301)
                  value:
                    success: false
                    error:
                      errorCode: P7301
                      message: Telecom lookup failed
                      description: >-
                        Unable to retrieve operator details from the upstream
                        provider.
                check_failed:
                  summary: SIM swap check failed (P7314)
                  value:
                    success: false
                    error:
                      errorCode: P7314
                      message: SIM swap check failed
                      description: The SIM swap check could not be completed.
        '400':
          description: >
            **HTTP 400.** Request rejected due to invalid parameters or an
            unsupported operator. Body is an error object only — no `success` or
            `swapped` fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                invalid_phone:
                  summary: Invalid phone number (P7102)
                  value:
                    message: Invalid Request
                    errorCode: P7102
                    description: 'Request error: Invalid phone number'
                operator_not_supported:
                  summary: Operator not supported (P7311)
                  value:
                    message: SIM swap check not supported for operator
                    errorCode: P7311
                    description: >-
                      No SIM swap check available for the phoneNumber's
                      operator.
        '401':
          description: >
            **HTTP 401.** Unauthorized. `clientId`/`clientSecret` headers are
            missing or invalid. Body is an error object only.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                credentials_required:
                  summary: Credentials missing (70001)
                  value:
                    message: Client credentials are required
                    errorCode: '70001'
                    description: clientId and clientSecret headers are required.
                invalid_credentials:
                  summary: Invalid credentials (70002)
                  value:
                    message: Invalid client credentials
                    errorCode: '70002'
                    description: The provided clientId and clientSecret are invalid.
  /v1/telecom/call-forwarding-check:
    post:
      tags:
        - CALL_FORWARDING
      summary: Call Forwarding Check
      description: >
        Checks whether call forwarding is currently active on the given phone
        number.


        Returns `callForwarding: true` if call forwarding is active, or
        `callForwarding: false` if it is not, along with a human-readable
        `callForwardingType`. Also returns enriched phone details (operator,
        country, type) regardless of forwarding status.


        Use this as a pre-authentication risk signal — active call forwarding
        can indicate an account-takeover attempt where calls (including voice
        OTP calls) are being diverted to another device.
      operationId: callForwardingCheck
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CallForwardingCheckRequest'
            examples:
              default:
                summary: Check call forwarding status
                value:
                  phoneNumber: '917020141726'
      responses:
        '200':
          description: >
            **HTTP 200** — Request accepted. Inspect `success` in the body:

            - **`success: true`** — Check completed. Use `callForwarding` to
            determine result.

            - **`success: false`** — Check could not be completed. Inspect
            `error` for details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CallForwardingCheckResponse'
              examples:
                not_forwarded:
                  summary: Call forwarding not active
                  value:
                    success: true
                    callForwarding: false
                    callForwardingType: inactive
                    phoneDetail:
                      operator: AIRTEL
                      countryCode: '91'
                      country: IN
                      type: MOBILE
                      homeOperator: VI
                      isPorted: true
                      location: India
                      timeZones:
                        - Asia/Kolkata
                forwarded:
                  summary: Call forwarding is active
                  value:
                    success: true
                    callForwarding: true
                    callForwardingType: active
                    phoneDetail:
                      operator: AIRTEL
                      countryCode: '91'
                      country: IN
                      type: MOBILE
                      homeOperator: AIRTEL
                      isPorted: false
                      location: India
                      timeZones:
                        - Asia/Kolkata
                telecom_lookup_failed:
                  summary: Telecom lookup failed (P7301)
                  value:
                    success: false
                    error:
                      errorCode: P7301
                      message: Telecom lookup failed
                      description: >-
                        Unable to retrieve operator details from the upstream
                        provider.
                check_failed:
                  summary: Call forwarding check failed (P7334)
                  value:
                    success: false
                    error:
                      errorCode: P7334
                      message: Call forwarding check failed
                      description: The call forwarding check could not be completed.
        '400':
          description: >
            **HTTP 400.** Request rejected due to invalid parameters or an
            unsupported operator. Body is an error object only — no `success` or
            `callForwarding` fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                invalid_phone:
                  summary: Invalid phone number (P7102)
                  value:
                    message: Invalid Request
                    errorCode: P7102
                    description: 'Request error: Invalid phone number'
                operator_not_supported:
                  summary: Operator not supported (P7331)
                  value:
                    message: Call forwarding check not supported for operator
                    errorCode: P7331
                    description: >-
                      No call forwarding check available for the phoneNumber's
                      operator.
        '401':
          description: >
            **HTTP 401.** Unauthorized. `clientId`/`clientSecret` headers are
            missing or invalid. Body is an error object only.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                credentials_required:
                  summary: Credentials missing (70001)
                  value:
                    message: Client credentials are required
                    errorCode: '70001'
                    description: clientId and clientSecret headers are required.
                invalid_credentials:
                  summary: Invalid credentials (70002)
                  value:
                    message: Invalid client credentials
                    errorCode: '70002'
                    description: The provided clientId and clientSecret are invalid.
  /v1/telecom/portability:
    post:
      tags:
        - PORTABILITY
      summary: Number Portability Check
      description: >
        Checks whether the given phone number has been ported (Mobile Number
        Portability / MNP) — that is, whether its current network operator
        differs from its home (originally registered) operator.


        Returns enriched phone details including `isPorted`. When `isPorted` is
        `true`, the `operator` (current network) differs from the `homeOperator`
        (original network).


        Use this as a pre-authentication risk signal — a recently ported number
        can be associated with porting-based account-takeover fraud.
      operationId: portabilityCheck
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PortabilityCheckRequest'
            examples:
              default:
                summary: Check number portability status
                value:
                  phoneNumber: '917020141726'
      responses:
        '200':
          description: >
            **HTTP 200** — Request accepted. Inspect `success` in the body:

            - **`success: true`** — Check completed. Use `phoneDetail.isPorted`
            to determine the result.

            - **`success: false`** — Check could not be completed. Inspect
            `error` for details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortabilityCheckResponse'
              examples:
                ported:
                  summary: Number is ported
                  value:
                    success: true
                    phoneDetail:
                      operator: JIO
                      countryCode: '91'
                      country: IN
                      type: MOBILE
                      homeOperator: AIRTEL
                      isPorted: true
                      location: India
                      timeZones:
                        - Asia/Kolkata
                not_ported:
                  summary: Number is not ported
                  value:
                    success: true
                    phoneDetail:
                      operator: AIRTEL
                      countryCode: '91'
                      country: IN
                      type: MOBILE
                      homeOperator: AIRTEL
                      isPorted: false
                      location: India
                      timeZones:
                        - Asia/Kolkata
                telecom_lookup_failed:
                  summary: Telecom lookup failed (P7301)
                  value:
                    success: false
                    error:
                      errorCode: P7301
                      message: Telecom lookup failed
                      description: >-
                        Unable to retrieve operator details from the upstream
                        provider.
        '400':
          description: >
            **HTTP 400.** Request rejected due to invalid parameters. Body is an
            error object only — no `success` field.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                invalid_phone:
                  summary: Invalid phone number (P7102)
                  value:
                    message: Invalid Request
                    errorCode: P7102
                    description: 'Request error: Invalid phone number'
        '401':
          description: >
            **HTTP 401.** Unauthorized. `clientId`/`clientSecret` headers are
            missing or invalid. Body is an error object only.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                credentials_required:
                  summary: Credentials missing (70001)
                  value:
                    message: Client credentials are required
                    errorCode: '70001'
                    description: clientId and clientSecret headers are required.
                invalid_credentials:
                  summary: Invalid credentials (70002)
                  value:
                    message: Invalid client credentials
                    errorCode: '70002'
                    description: The provided clientId and clientSecret are invalid.
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: clientId
      description: OTPless API Client ID
    ApiSecretAuth:
      type: apiKey
      in: header
      name: clientSecret
      description: OTPless API Client Secret
  schemas:
    SimSwapCheckRequest:
      type: object
      required:
        - phoneNumber
      properties:
        phoneNumber:
          type: string
          example: '917020141726'
          description: >-
            Phone number including country code, without plus sign. Example:
            917020141726 for +91 70201 41726.
        maxAge:
          type: integer
          example: 72
          description: >-
            Maximum age of SIM swap to check, in hours. Example: 72 checks
            whether the SIM was swapped in the last 3 days. Omit to use the
            default lookback window.
    SimSwapCheckResponse:
      type: object
      required:
        - success
      properties:
        success:
          type: boolean
          description: >-
            `true` if the check completed successfully. `false` if the check
            could not be completed — inspect the `error` object for details.
        swapped:
          type: boolean
          description: >-
            `true` if a SIM swap was detected within the `maxAge` window.
            `false` if no swap was detected. Omitted when `success` is `false`.
        phoneDetail:
          $ref: '#/components/schemas/PhoneDetail'
        error:
          $ref: '#/components/schemas/ErrorInBody'
    CallForwardingCheckRequest:
      type: object
      required:
        - phoneNumber
      properties:
        phoneNumber:
          type: string
          example: '917020141726'
          description: >-
            Phone number including country code, without plus sign. Example:
            917020141726 for +91 70201 41726.
    CallForwardingCheckResponse:
      type: object
      required:
        - success
      properties:
        success:
          type: boolean
          description: >-
            `true` if the check completed successfully. `false` if the check
            could not be completed — inspect the `error` object for details.
        callForwarding:
          type: boolean
          description: >-
            `true` if call forwarding is currently active on the number. `false`
            if it is not. Omitted when `success` is `false`.
        callForwardingType:
          type: string
          example: inactive
          description: >-
            Human-readable forwarding state: `active` when call forwarding is
            on, `inactive` when off. Omitted when `success` is `false`.
        phoneDetail:
          $ref: '#/components/schemas/PhoneDetail'
        error:
          $ref: '#/components/schemas/ErrorInBody'
    PortabilityCheckRequest:
      type: object
      required:
        - phoneNumber
      properties:
        phoneNumber:
          type: string
          example: '917020141726'
          description: >-
            Phone number including country code, without plus sign. Example:
            917020141726 for +91 70201 41726.
    PortabilityCheckResponse:
      type: object
      required:
        - success
      properties:
        success:
          type: boolean
          description: >-
            `true` if the check completed successfully. `false` if the check
            could not be completed — inspect the `error` object for details.
        phoneDetail:
          $ref: '#/components/schemas/PhoneDetail'
        error:
          $ref: '#/components/schemas/ErrorInBody'
    PhoneDetail:
      type: object
      description: >-
        Enriched phone metadata. Fields are omitted when not available for the
        given number or operator.
      properties:
        operator:
          type: string
          example: JIO
          description: Current network operator (e.g. JIO, AIRTEL, VI).
        countryCode:
          type: string
          example: '91'
          description: Numeric country code.
        country:
          type: string
          example: IN
          description: ISO 3166-1 alpha-2 country code.
        type:
          type: string
          example: MOBILE
          description: Phone line type (e.g. MOBILE, LANDLINE).
        homeOperator:
          type: string
          example: JIO
          description: >-
            Home (registered) operator, which may differ from current operator
            if roaming.
        isPorted:
          type: boolean
          example: true
          description: >-
            `true` if the number has been ported away from its home operator (so
            `operator` differs from `homeOperator`).
        location:
          type: string
          example: India
          description: >-
            Location string for the phone number (city, state, or country
            level).
        timeZones:
          type: array
          items:
            type: string
          example:
            - Asia/Kolkata
          description: IANA time zones for the phone number's registered location.
    Error:
      type: object
      description: Error response body for HTTP 4xx responses.
      properties:
        message:
          type: string
          example: Invalid Request
        errorCode:
          type: string
          example: P7102
          description: >-
            Machine-readable error code. See the error code reference for the
            full list.
        description:
          type: string
          example: 'Request error: Invalid phone number'
    ErrorInBody:
      type: object
      description: Error object returned inside a 200 response when `success` is `false`.
      properties:
        errorCode:
          type: string
          description: Machine-readable error code.
        message:
          type: string
        description:
          type: string
security:
  - ApiKeyAuth: []
    ApiSecretAuth: []
